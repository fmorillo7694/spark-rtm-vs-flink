# Spark 4.1.2 standalone cluster: 1 master + 2 workers (4 cores each = 8 worker cores).
# Honors the article's "one core per input partition" rule (3 partitions -> >=3 cores).
# JupyterLab is the driver host used by the PySpark py4j RTM demo.
#
# Brought up alongside docker-compose.kafka.yml (shared `spark-flink-bench` network).
name: spark-flink

networks:
  bench:
    name: spark-flink-bench
    external: true

services:
  spark-master:
    image: ${SPARK_IMAGE:-apache/spark:4.1.2-scala2.13-java17-ubuntu}
    container_name: spark-master
    hostname: spark-master
    networks: [bench]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master --port 7077 --webui-port 8080
    ports:
      - "8080:8080"   # master web UI
      - "7077:7077"   # cluster submit endpoint
    volumes:
      - ./spark:/workspace/spark:ro
      - ./results:/workspace/results
      - spark-ivy:/opt/spark/.ivy2
      - spark-ckpt:/tmp/spark-checkpoints
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  spark-worker-1: &worker
    image: ${SPARK_IMAGE:-apache/spark:4.1.2-scala2.13-java17-ubuntu}
    container_name: spark-worker-1
    hostname: spark-worker-1
    networks: [bench]
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_NO_DAEMONIZE: "true"
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077 --cores 4 --memory 2g --webui-port 8081
    volumes:
      - ./spark:/workspace/spark:ro
      - ./results:/workspace/results
      - spark-ivy:/opt/spark/.ivy2
      - spark-ckpt:/tmp/spark-checkpoints

  spark-worker-2:
    <<: *worker
    container_name: spark-worker-2
    hostname: spark-worker-2
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077 --cores 4 --memory 2g --webui-port 8081

  # Driver host for the PySpark py4j RTM demo. Built-in PySpark matches the cluster.
  jupyter:
    image: ${SPARK_IMAGE:-apache/spark:4.1.2-scala2.13-java17-ubuntu}
    container_name: spark-jupyter
    hostname: spark-jupyter
    networks: [bench]
    user: root
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_INTERNAL: ${KAFKA_BOOTSTRAP_INTERNAL:-kafka:9092}
      SPARK_MASTER_URL: spark://spark-master:7077
    command: ["sleep", "infinity"]
    ports:
      - "8888:8888"
    volumes:
      - ./spark:/workspace/spark
      - ./results:/workspace/results
      - spark-ivy:/opt/spark/.ivy2
      - spark-ckpt:/tmp/spark-checkpoints

volumes:
  spark-ivy:
  spark-ckpt:
