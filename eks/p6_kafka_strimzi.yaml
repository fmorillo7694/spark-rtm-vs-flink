# Strimzi Kafka on EKS — 3 brokers, KRaft (no ZooKeeper), for the 100k+ evt/s run.
# Apply AFTER the Strimzi operator is installed (see eks/02_install.sh).
#
# Topic durability: replication.factor=3, min.insync.replicas=2 (tolerates 1 broker loss).
# Producers use acks=1 (leader ack) per the benchmark spec — set on the producer client,
# not here; the broker just enforces min.insync.replicas for acks=all writers.
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: brokers
  namespace: kafka
  labels:
    strimzi.io/cluster: bench
spec:
  replicas: 3
  roles:
    - broker
    - controller        # combined KRaft role; 3 nodes form the controller quorum
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 100Gi
        deleteClaim: true
        kraftMetadata: shared
  resources:
    requests: { cpu: "2", memory: 6Gi }
    limits:   { cpu: "3", memory: 8Gi }
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: bench
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.0
    metadataVersion: 4.1-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      # 3-broker durability defaults for auto-created/managed topics.
      default.replication.factor: 3
      min.insync.replicas: 2
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      num.partitions: 6
      # Throughput-leaning for 100k/s:
      num.io.threads: 16
      num.network.threads: 8
      log.retention.hours: 1
  entityOperator:
    topicOperator: {}
---
# Input topic — 12 partitions to give RTM (one core/partition) and Flink room to scale.
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: input-events
  namespace: kafka
  labels:
    strimzi.io/cluster: bench
spec:
  partitions: 6
  replicas: 3
  config:
    min.insync.replicas: "2"
    retention.ms: "3600000"
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: output-events
  namespace: kafka
  labels:
    strimzi.io/cluster: bench
spec:
  partitions: 6
  replicas: 3
  config:
    min.insync.replicas: "2"
    retention.ms: "3600000"
