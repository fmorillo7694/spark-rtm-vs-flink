# PyFlink Table API job as a FlinkDeployment (application mode, python entrypoint).
# Uses the pyflink image (Flink 2.2 + python + apache-flink + sql-kafka connector).
# Bundle tuning is in the job itself (python.fn-execution.bundle.time=1).
apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: flink-bench
  namespace: flink
spec:
  image: "__REGISTRY__/rtm-bench/pyflink:__TAG__"
  imagePullPolicy: Always
  flinkVersion: v2_0
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "4"
    execution.buffer-timeout: "0 ms"
    python.fn-execution.bundle.time: "1"
    python.fn-execution.bundle.size: "1000"
    execution.checkpointing.interval: "60 s"
    execution.checkpointing.mode: "AT_LEAST_ONCE"
    state.checkpoints.dir: "s3://rtm-flink-bench-ckpt-__ACCOUNT__/pyflink"
    restart-strategy.type: "fixed-delay"
    restart-strategy.fixed-delay.attempts: "10"
    restart-strategy.fixed-delay.delay: "2 s"
  serviceAccount: flink
  podTemplate:
    spec:
      containers:
        - name: flink-main-container
          env:
            - name: ENABLE_BUILT_IN_PLUGINS
              value: "flink-s3-fs-presto-2.2.0.jar"
  jobManager:
    resource: { memory: "2048m", cpu: 1 }
  taskManager:
    replicas: 3
    resource: { memory: "4096m", cpu: 3 }
  job:
    jarURI: "local:///opt/flink/opt/flink-python-2.2.0.jar"   # python driver shim
    entryClass: "org.apache.flink.client.python.PythonDriver"
    args:
      - "-pyclientexec"
      - "/usr/bin/python3"
      - "-py"
      - "/opt/pyflink/stateless_pipeline.py"
      - "bench-kafka-bootstrap.kafka.svc:9092"
      - "input-events"
      - "output-events"
      - "12"
    parallelism: 12
    upgradeMode: stateless
