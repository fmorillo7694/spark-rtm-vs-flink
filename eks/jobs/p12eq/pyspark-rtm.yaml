# PySpark RTM SparkApplication — Python driver, py4j bridge for Trigger.RealTime,
# out_ts via reflect() (no executor Python). type: Python.
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: rtm-bench
  namespace: spark
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "__REGISTRY__/rtm-bench/spark:__TAG__"
  imagePullPolicy: Always
  mainApplicationFile: "local:///opt/spark/work-dir/rtm_pyspark_measured.py"
  sparkVersion: "4.1.2"
  sparkConf:
    spark.sql.adaptive.enabled: "false"
    spark.sql.shuffle.partitions: "12"
    spark.hadoop.fs.s3a.aws.credentials.provider: "software.amazon.awssdk.auth.credentials.WebIdentityTokenFileCredentialsProvider"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 5
    onFailureRetryInterval: 5
    onSubmissionFailureRetries: 3
    onSubmissionFailureRetryInterval: 5
  driver:
    cores: 1
    memory: "2g"
    serviceAccount: spark-operator-spark
    env:
      - { name: KAFKA_BOOTSTRAP_INTERNAL, value: "bench-kafka-bootstrap.kafka.svc:9092" }
      - { name: INPUT_TOPIC, value: "input-events" }
      - { name: OUTPUT_TOPIC, value: "output-events" }
      - { name: RTM_TRIGGER, value: "60 seconds" }
      - { name: CHECKPOINT_LOCATION, value: "s3a://rtm-flink-bench-ckpt-__ACCOUNT__/pyspark-rtm" }
  executor:
    instances: 4
    cores: 3
    memory: "3g"
