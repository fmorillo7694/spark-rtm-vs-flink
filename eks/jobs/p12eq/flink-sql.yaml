# Flink SQL (Table API) job as a FlinkDeployment (application mode), parallelism 12 to
# match input partitions. Schema-based json format + keyed-by-user_id output, so the JSON
# path and partitioning match Spark RTM. Equal resources to every other engine (13c/14GB).
apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: flink-bench
  namespace: flink
spec:
  image: "__REGISTRY__/rtm-bench/flink:__TAG__"
  imagePullPolicy: Always
  flinkVersion: v2_0
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "3"
    execution.buffer-timeout: "0 ms"
    state.backend.type: "hashmap"
    execution.checkpointing.interval: "60 s"
    execution.checkpointing.mode: "AT_LEAST_ONCE"
    state.checkpoints.dir: "s3://rtm-flink-bench-ckpt-__ACCOUNT__/flink-sql"
    restart-strategy.type: "fixed-delay"
    restart-strategy.fixed-delay.attempts: "10"
    restart-strategy.fixed-delay.delay: "2 s"
  serviceAccount: flink
  podTemplate:
    spec:
      containers:
        - name: flink-main-container
          env:
            - name: ENABLE_BUILT_IN_PLUGINS
              value: "flink-s3-fs-presto-2.2.0.jar"
  jobManager:
    resource:
      memory: "2048m"
      cpu: 1
  taskManager:
    replicas: 4        # 4 TMs x 3 slots = 12 slots for parallelism 12
    resource:
      memory: "3072m"
      cpu: 3
  job:
    jarURI: "local:///opt/flink/usrlib/flink-sql.jar"
    entryClass: "bench.SqlPipeline"
    args:
      - "bench-kafka-bootstrap.kafka.svc:9092"
      - "input-events"
      - "output-events"
      - "12"
    parallelism: 12
    upgradeMode: stateless
