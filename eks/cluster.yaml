# eksctl manifest — production-grade EKS cluster for the RTM-vs-Flink benchmark.
# Security baseline: KMS secrets envelope encryption, OIDC for IRSA, private+public
# endpoint, managed node group on private subnets, IMDSv2 required. Sized for a 100k+
# evt/s run with Spark + Flink + Strimzi.
# REPLACE the <YOUR_*> placeholders before running (see eks/01_create_cluster.sh header).
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: rtm-flink-bench3
  region: us-east-1
  version: "1.31"
  tags:
    project: spark-rtm-vs-flink
    owner: fmorillo
    lifecycle: ephemeral-benchmark
    teardown: "yes"

# IAM OIDC provider so operators (Spark/Flink/Strimzi) can use IRSA.
iam:
  withOIDC: true

# @secure_recommendation: KMS envelope encryption for Kubernetes secrets (ARCC eks baseline)
secretsEncryption:
  # Dedicated us-east-1 CMK created by eks/01_create_cluster.sh (alias rtm-flink-bench3-secrets).
  keyARN: "arn:aws:kms:us-east-1:<YOUR_ACCOUNT_ID>:key/<YOUR_KMS_KEY_ID>"

# Control-plane logging to CloudWatch (audit/authenticator) — observability + ARCC.
cloudWatch:
  clusterLogging:
    enableTypes: ["api", "audit", "authenticator", "controllerManager", "scheduler"]

# @secure_recommendation: reuse the existing benchmark VPC's subnets so we create NO new
# VPC and NO new EIP/NAT (account is at both limits). Nodes land on the private subnets
# (existing NAT for egress); control-plane ENIs span public+private. Public endpoint kept
# ON only so this session's kubectl can reach the API; destroyed at teardown.
vpc:
  id: <YOUR_VPC_ID>
  subnets:
    public:
      us-east-1d: { id: <YOUR_PUBLIC_SUBNET_AZ1> }
      us-east-1f: { id: <YOUR_PUBLIC_SUBNET_AZ2> }
    private:
      us-east-1d: { id: <YOUR_PRIVATE_SUBNET_AZ1> }
      us-east-1f: { id: <YOUR_PRIVATE_SUBNET_AZ2> }
  clusterEndpoints:
    publicAccess: true
    privateAccess: true

managedNodeGroups:
  - name: bench-ng
    instanceType: m5.2xlarge        # 8 vCPU / 32 GiB
    desiredCapacity: 6              # 48 vCPU / 192 GiB total
    minSize: 6
    maxSize: 8
    volumeSize: 100
    volumeType: gp3
    volumeEncrypted: true           # @secure_recommendation: encrypted EBS (ARCC ec2 baseline)
    privateNetworking: true         # @secure_recommendation: nodes in private subnets
    disableIMDSv1: true             # @secure_recommendation: IMDSv2 required (ARCC ec2 baseline)
    labels:
      workload: bench
    tags:
      project: spark-rtm-vs-flink
      lifecycle: ephemeral-benchmark
    iam:
      withAddonPolicies:
        ebs: true                   # for EBS CSI dynamic volumes (Kafka/checkpoints)
        cloudWatch: true

addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy
  - name: aws-ebs-csi-driver        # dynamic gp3 PVCs for Strimzi brokers
